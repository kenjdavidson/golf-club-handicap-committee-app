name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test
        env:
          GOLFCANADA_USERNAME: ${{ secrets.GOLFCANADA_USERNAME }}
          GOLFCANADA_PASSWORD: ${{ secrets.GOLFCANADA_PASSWORD }}
        run: mvn -B test
