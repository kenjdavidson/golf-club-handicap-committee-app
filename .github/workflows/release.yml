name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-release:
    name: Build ${{ matrix.platform.name }} native image
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            runner: ubuntu-latest
          - name: macos
            runner: macos-latest
          - name: windows
            runner: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive release version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build native image
        shell: bash
        run: >
          ./gradlew --no-daemon nativeCompile
          -Pvaadin.productionMode=true
          -Prelease.version=${{ env.RELEASE_VERSION }}

      - name: Package native binary (Unix)
        if: matrix.platform.runner != 'windows-latest'
        shell: bash
        run: |
          cd build/native/nativeCompile
          zip HandicapCommitteeApp-${{ matrix.platform.name }}.zip HandicapCommitteeApp

      - name: Package native binary (Windows)
        if: matrix.platform.runner == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path build/native/nativeCompile/HandicapCommitteeApp.exe `
            -DestinationPath build/native/nativeCompile/HandicapCommitteeApp-${{ matrix.platform.name }}.zip

      - name: Upload native binary
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.platform.name }}
          path: build/native/nativeCompile/HandicapCommitteeApp-${{ matrix.platform.name }}.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    needs: build-release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: dist/*.zip
          generate_release_notes: true
