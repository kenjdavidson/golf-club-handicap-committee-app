name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-release:
    name: Build ${{ matrix.platform.name }} bundle
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            runner: macos-latest
          - name: Windows
            runner: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Derive release version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build release archive
        shell: bash
        env:
          GOLFCANADA_USERNAME: ${{ secrets.GOLFCANADA_USERNAME }}
          GOLFCANADA_PASSWORD: ${{ secrets.GOLFCANADA_PASSWORD }}
        run: >
          ./gradlew --no-daemon clean build jpackageAppArchive
          -Pproduction
          -Prelease.version=${{ env.RELEASE_VERSION }}
          -Pjpackage.app.version=${{ env.RELEASE_VERSION }}

      - name: Upload release archive
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.platform.name }}
          path: build/distributions/*.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    needs: build-release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: dist/*.zip
          generate_release_notes: true
