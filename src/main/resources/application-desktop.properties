# ============================================================
# Desktop profile – overrides for local / desktop use
# ============================================================
# These settings are applied automatically when the application is launched
# via HandicapApplication.main() (which activates the 'desktop' profile).
# Cloud deployments should NOT activate this profile.

# Bind the embedded server to loopback only so the app is unreachable from
# the network or the internet.
server.address=127.0.0.1

# Aggressively close idle Vaadin sessions so that the desktop app shuts down
# promptly when the browser window is closed.
vaadin.heartbeatInterval=2
vaadin.closeIdleSessions=true
