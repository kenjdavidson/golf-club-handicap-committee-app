openapi: 3.0.3
info:
  title: Golf Canada API Client
  description: Minimal Golf Canada API operations required by the Handicap Committee app.
  version: 1.0.0
servers:
  - url: https://scg.golfcanada.ca
paths:
  /connect/token:
    post:
      summary: Retrieve authentication token
      tags: [Authentication]
      operationId: authenticate
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
        '400':
          description: Invalid request
        '401':
          description: Not authorized

  /api/members/{userId}/getSnapshot:
    get:
      summary: Retrieve member profile information
      tags: [Members]
      operationId: getProfile
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Member profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          description: Not authorized
        '404':
          description: Member not found

  /api/members/{userId}/getHandicapHistory:
    get:
      summary: Retrieve member handicap history
      tags: [Members]
      operationId: getHistory
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: offsetInDays
          in: query
          required: false
          schema:
            type: integer
            default: -365
      responses:
        '200':
          description: Member handicap history retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoryEntry'
        '401':
          description: Not authorized
        '404':
          description: Member not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthRequest:
      type: object
      required:
        - grant_type
        - username
        - password
      properties:
        grant_type:
          type: string
          default: password
        username:
          type: string
        password:
          type: string
        rememberme:
          type: boolean
        scope:
          type: string
        client_id:
          type: string
        client_secret:
          type: string
    AuthToken:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
          format: int32
        refresh_token:
          type: string
        scope:
          type: string
      additionalProperties: true
    Profile:
      type: object
      description: Member snapshot payload as returned by Golf Canada.
      properties:
        club:
          type: string
        membershipType:
          type: string
        expirationDate:
          type: string
          pattern: "[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}"
        homeCourse:
          type: string
        defaultTee:
          type: string
        courseHandicap:
          type: string
        winterHandicap:
          type: string
        winterCourseHandicap:
          type: string
        isWinterHandicapDisplayed:
          type: boolean
        scores:
          type: array
          items:
            type: object
            additionalProperties: true
        clubManagementGroup:
          type: string
        ytdScoreCount:
          type: integer
        ytdScoreAverage:
          type: number
          format: double
        ytdYear:
          type: integer
        transferClubName:
          type: string
        transferRequestDate:
          type: string
          pattern: "[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}"
        lastCardRequestedOn:
          type: string
          pattern: "[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\\.[0-9]+)?"
        expectedDeliveryOn:
          type: string
          pattern: "[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}"
        isCardsSentToClub:
          type: boolean
        lowHandicap:
          type: string
        lowHandicapOn:
          type: string
          pattern: "[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}"
        adjustedLowHandicap:
          type: string
        displayLowHandicap:
          type: string
        adjustedLowHandicapStartOn:
          type: string
          pattern: "[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}"
        adjustedLowHandicapEndOn:
          type: string
          pattern: "[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}"
        lowHandicapAdjustedOn:
          type: string
          pattern: "[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}"
        isLowIndexAdjusted:
          type: boolean
        subscriptionRenewsOn:
          type: string
          pattern: "[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}"
    HistoryEntry:
      type: object
      description: Handicap history entry payload as returned by Golf Canada.
      properties:
        date:
          type: string
          pattern: "[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}"
        handicap:
          type: number
          format: double
        lowHandicap:
          type: number
          format: double
