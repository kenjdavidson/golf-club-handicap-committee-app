settings.parser.type.pdfType2.description=Provides Date, Time, Holes, Player, Tee, Type, Paid, and No Show columns. Rows marked No Show=Yes are excluded from date matching.
settings.parser.type.pdfType3.name=ClubLink Rounds History
settings.parser.type.pdfType3.description=Parses ClubLink Rounds History PDFs. Extracts player name from the report header and round dates from space-delimited rows. Rows marked No Show=Yes are excluded from date matching.
