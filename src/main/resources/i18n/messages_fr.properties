settings.parser.type.pdfType2.description=Fournit les colonnes Date, Time, Holes, Player, Tee, Type, Paid et No Show. Les lignes marquées No Show=Yes sont exclues de la comparaison des dates.
settings.parser.type.pdfType3.name=ClubLink Historique des rondes
settings.parser.type.pdfType3.description=Analyse les PDF d'historique des rondes ClubLink. Extrait le nom du joueur de l'en-tête du rapport et les dates de ronde des lignes délimitées par des espaces. Les lignes marquées No Show=Yes sont exclues de la comparaison des dates.
