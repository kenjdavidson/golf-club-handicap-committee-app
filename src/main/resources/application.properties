# ============================================================
# Golf Club Handicap Committee App – Application Configuration
# ============================================================

# ------------------------------------
# Server
# ------------------------------------
# By default the server listens on all interfaces (0.0.0.0) so that it can be
# deployed to a cloud environment as well as run locally.
# When running as a desktop application the 'desktop' profile overrides this to
# 127.0.0.1 so the embedded server is never reachable from outside the machine.
server.port=8080

# ------------------------------------
# Security – the login screen authenticates committee users against
# Golf Canada's token endpoint.
# Optionally override the base URL with APP_GOLF_CANADA_BASE_URL for local
# testing against a mock service.
# ------------------------------------

# ------------------------------------
# Datasource – H2 in-memory database
# ------------------------------------
# An in-memory datasource means that ALL data (including any PII that passes
# through the application during a session) is automatically discarded when
# the process exits.  Nothing is written to disk.
spring.datasource.url=jdbc:h2:mem:handicapdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ------------------------------------
# JPA / Hibernate
# ------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# Disable open-in-view (all data access is done within service methods)
spring.jpa.open-in-view=false

# ------------------------------------
# File upload
# ------------------------------------
# Increase Spring's multipart limits to accommodate PDF scorecards.
# The Vaadin upload component also enforces a 25 MB client-side limit
# (configured in SingleFileUploadCard).
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# ------------------------------------
# H2 Console – disabled for security
# ------------------------------------
# The H2 console is disabled to reduce the attack surface.
spring.h2.console.enabled=false

# ------------------------------------
# Vaadin
# ------------------------------------
# Dev mode is intentionally left at its default (enabled) here so that
# developers get hot-reload and other dev-tools during local development.
# The 'production' Maven profile sets vaadin.productionMode=true which
# automatically disables dev mode for release builds.

# ------------------------------------
# Logging
# ------------------------------------
logging.level.root=WARN
logging.level.com.kenjdavidson.golf.handicap=INFO
logging.level.org.springframework.security=WARN

# ------------------------------------
# Verification
# ------------------------------------
app.verification.max-rounds=20

# ------------------------------------
# AI / Ollama
# ------------------------------------
# Base URL for the Ollama HTTP API.  Override with APP_AI_OLLAMA_BASE_URL or
# the property below to point at a non-default Ollama instance.
app.ai.ollama.base-url=http://localhost:11434

# Gemini API defaults.  API keys are entered in Settings and saved per user.
# APP_AI_GEMINI_API_KEY can be set to pre-configure a shared key for all users
# (useful for cloud deployments).  A user-entered key in Settings takes precedence.
app.ai.gemini.base-url=https://generativelanguage.googleapis.com
app.ai.gemini.model=gemini-2.5-flash
app.ai.gemini.temperature=0.1
# app.ai.gemini.api-key=

# Controls which AI integration types are shown in the Settings UI.
# Set APP_AI_ALLOWED_TYPES (or app.ai.allowed-types) to a comma-separated list
# of AiIntegrationType values to restrict available options.
# Useful for cloud deployments where Ollama/Docker is not available.
# Example (Gemini-only cloud deployment): APP_AI_ALLOWED_TYPES=NONE,GEMINI
# Default: all types available.
# app.ai.allowed-types=NONE,EXTERNAL,LOCAL,GEMINI
