# ============================================================
# Golf Club Handicap Committee App – Application Configuration
# ============================================================

# ------------------------------------
# Server – bind to localhost ONLY
# ------------------------------------
# Binding to 127.0.0.1 ensures the embedded server is never reachable from
# the local network or the internet; only processes on this machine can
# connect.
server.address=127.0.0.1
server.port=8080

# ------------------------------------
# Security – the login screen authenticates committee users against
# Golf Canada's token endpoint.
# Optionally override the base URL with APP_GOLF_CANADA_BASE_URL for local
# testing against a mock service.
# ------------------------------------

# ------------------------------------
# Datasource – H2 in-memory database
# ------------------------------------
# An in-memory datasource means that ALL data (including any PII that passes
# through the application during a session) is automatically discarded when
# the process exits.  Nothing is written to disk.
spring.datasource.url=jdbc:h2:mem:handicapdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ------------------------------------
# JPA / Hibernate
# ------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# Disable open-in-view (not needed for a desktop app backed by a session-scoped store)
spring.jpa.open-in-view=false

# ------------------------------------
# H2 Console – disabled for security
# ------------------------------------
# Even though the server is localhost-only, we disable the H2 console to
# reduce the attack surface.
spring.h2.console.enabled=false

# ------------------------------------
# Vaadin
# ------------------------------------
# Dev mode is intentionally left at its default (enabled) here so that
# developers get hot-reload and other dev-tools during local development.
# The 'production' Maven profile sets vaadin.productionMode=true which
# automatically disables dev mode for release builds.

# Tell the browser window to heartbeat every 2 seconds
vaadin.heartbeatInterval=2

# Close the session immediately when heartbeats stop
vaadin.closeIdleSessions=true

# ------------------------------------
# Logging
# ------------------------------------
logging.level.root=WARN
logging.level.com.kenjdavidson.golf.handicap=INFO
logging.level.org.springframework.security=WARN

# ------------------------------------
# Verification
# ------------------------------------
app.verification.max-rounds=20
